        <h1>Contact</h1>
        <p>Get in touch with me for travel tips, collaborations, or just to say hello!</p>
    </header>

    <div class="info">
        <br>
        <br>

        <form action="mailto:your.email@example.com" method="post" enctype="text/plain">
            <div class="box">
            <label for="name">Your Name:</label>
            <input type="text" id="name" name="name" required>
            </div>
            <div class="box">
            <label for="email">Your Email:</label>
            <input type="email" id="email" name="email" required>
            </div class="box">
            <div class="box">
            <label for="message">Your Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>
            </div>
            <button type="submit">Send Message</button>
        </form>
    
        <h2>Connect with Me 📱</h2>
        <p class="contact_details"><strong>Email:</strong> <a href="mailto:your.email@example.com">your.email@example.com</a></p>
        <p class="contact_details"><strong>Follow Me on Social Media:</strong></p>
        <p class="contact_details">
            <a href="https://instagram.com/yourprofile" target="_blank">📷 Instagram</a> | 
            <a href="https://youtube.com/yourchannel" target="_blank">🎥 YouTube</a> | 
            <a href="https://twitter.com/yourprofile" target="_blank">🐦 Twitter</a>
        </p>
